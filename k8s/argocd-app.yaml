apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: static-site
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/lulzimv/mini-hr-system.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:                     # 👈 KËTU
    automated:
      prune: true
      selfHeal: true
