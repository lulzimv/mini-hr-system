apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: static-site-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: site.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: static-site-service
            port:
              number: 80
