<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini SHPK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="mb-4 text-center">Mini SHPK</h3>

          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input name="username" id="username" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input name="password" id="password" type="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>

          <div id="err" class="text-danger mt-3 text-center"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    const r = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username, password })
    });

    if (r.ok) {
      setTimeout(() => {
        window.location = "/";
      }, 250);
    } else {
      document.getElementById("err").innerText = "Login failed";
    }
  } catch(err) {
    document.getElementById("err").innerText = "Connection error";
  }
});
</script>

</body>
</html>
