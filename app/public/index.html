<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini HR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<style>
body { background:#f8f9fa; }
.card-soft{
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  border:0;
}
</style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid d-flex justify-content-between">
    <span class="navbar-brand">Mini HR</span>
    <div class="d-flex gap-2">
      <a href="/admin-users.html" id="manageUsersBtn" class="btn btn-outline-light btn-sm" style="display:none;">Manage users</a>
      <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
  </div>
</nav>

<div class="container py-4">

  <div class="row g-3 mb-3">

    <div class="col-md-3">
      <div class="card card-soft p-3 h-100">
        <h6>Welcome</h6>
        <div id="meBox">Loading...</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card card-soft p-3 h-100">
        <h6>Leave balance</h6>
        <div class="progress mb-2" style="height:20px;">
          <div id="leaveBar" class="progress-bar bg-success" style="width:0%"></div>
        </div>
        <div id="leaveBox">Loading...</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card card-soft p-3 h-100">
        <h6>Today status</h6>
        <div id="todayStatus">Loading...</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card card-soft p-3 h-100">
        <h6>Upcoming leave</h6>
        <div id="upcomingLeave">Loading...</div>
      </div>
    </div>

  </div>

  <div class="card card-soft p-3 mb-3">
    <h5>Request Leave</h5>

    <div class="row g-2">
      <div class="col-md-3">
        <input type="date" id="start" class="form-control">
      </div>

      <div class="col-md-3">
        <input type="date" id="end" class="form-control">
      </div>

      <div class="col-md-3">
        <select id="leaveType" class="form-select">
          <option value="annual">Annual leave</option>
          <option value="sick">Sick leave</option>
        </select>
      </div>

      <div class="col-md-3">
        <input type="file" id="medical" class="form-control">
      </div>
    </div>

    <div class="row mt-2">
      <div class="col-md-3">
        <button onclick="requestLeave()" class="btn btn-primary w-100">Submit</button>
      </div>
    </div>

    <div id="msg" class="mt-2 text-danger"></div>
  </div>

  <div class="card card-soft p-3 mb-3">
    <h5>Leave Requests</h5>

    <table class="table table-sm align-middle">
      <thead>
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>From</th>
          <th>To</th>
          <th>Days</th>
          <th>Type</th>
          <th>Status</th>
          <th id="actionHead">Action</th>
        </tr>
      </thead>
      <tbody id="leaveTable"></tbody>
    </table>
  </div>

  <div class="card card-soft p-3 mb-3">
    <h5>Payslips</h5>
    <div id="payslipBox">Loading...</div>
  </div>

  <div class="card card-soft p-3">
    <h5>Leave Calendar</h5>
    <div id="calendar"></div>
  </div>

</div>

<script>
let currentUser = null;
let calendar = null;

function badgeForStatus(status){
  if(status === 'approved') return '<span class="badge bg-success">approved</span>';
  if(status === 'pending') return '<span class="badge bg-warning text-dark">pending</span>';
  return '<span class="badge bg-danger">rejected</span>';
}

async function loadMe(){
  const r = await fetch('/api/me', { credentials:'include' });
  if(!r.ok){
    window.location = '/login.html';
    return;
  }

  const me = await r.json();
  currentUser = me;

  document.getElementById("meBox").innerHTML =
    `User: ${me.username}<br>
     Role: ${me.role}<br>
     Annual leave: ${me.annual_leave}`;

  if(me.role === 'admin'){
    document.getElementById("manageUsersBtn").style.display = 'inline-block';
  } else {
    document.getElementById("actionHead").style.display = 'none';
  }
}

async function loadStats(){
  const r = await fetch('/api/stats', { credentials:'include' });
  const s = await r.json();

  const total = s.annual_leave || 0;
  const approved = s.approved_days || 0;
  const remaining = s.remaining_leave || 0;
  const percent = total > 0 ? Math.round((approved / total) * 100) : 0;

  document.getElementById("leaveBar").style.width = percent + "%";
  document.getElementById("leaveBar").innerText = percent + "%";
  document.getElementById("leaveBox").innerHTML =
    `Approved ${approved} / Remaining ${remaining}`;
}

async function loadLeaves(){
  const r = await fetch('/api/leaves', { credentials:'include' });
  const rows = await r.json();

  const el = document.getElementById("leaveTable");
  el.innerHTML = "";

  const today = new Date().toISOString().slice(0,10);
  let upcoming = [];
  let onLeave = false;

  if(!rows.length){
    el.innerHTML = `<tr><td colspan="8" class="text-muted text-center">No leave requests</td></tr>`;
  }

  rows.forEach(l => {
    let actions = "";

    if(currentUser && currentUser.role === 'admin' && l.status === "pending"){
      actions = `
        <button onclick="approve(${l.id})" class="btn btn-success btn-sm">Approve</button>
        <button onclick="reject(${l.id})" class="btn btn-danger btn-sm">Reject</button>
        <button onclick="deleteLeave(${l.id})" class="btn btn-dark btn-sm">Delete</button>
      `;
    } else if(currentUser && currentUser.role === 'admin') {
      actions = `<button onclick="deleteLeave(${l.id})" class="btn btn-dark btn-sm">Delete</button>`;
    }

    el.innerHTML += `
      <tr>
        <td>${l.id}</td>
        <td>${l.username}</td>
        <td>${l.start_date}</td>
        <td>${l.end_date}</td>
        <td>${l.days}</td>
        <td>${l.type || 'annual'}</td>
        <td>${badgeForStatus(l.status)}</td>
        <td>${actions}</td>
      </tr>
    `;

    if(l.status === "approved"){
      if(today >= l.start_date && today <= l.end_date) onLeave = true;
      if(l.start_date > today) upcoming.push(`${l.username}: ${l.start_date}`);
    }
  });

  document.getElementById("todayStatus").innerHTML =
    onLeave
      ? '<span class="text-danger">On leave</span>'
      : '<span class="text-success">Working</span>';

  document.getElementById("upcomingLeave").innerHTML =
    upcoming.length ? upcoming.slice(0,3).join("<br>") : 'No upcoming leave';
}

async function approve(id){
  await fetch('/api/leave/' + id + '/approve', {
    method:'POST',
    credentials:'include'
  });
  await init();
}

async function reject(id){
  await fetch('/api/leave/' + id + '/reject', {
    method:'POST',
    credentials:'include'
  });
  await init();
}

async function deleteLeave(id){
  if(!confirm("Delete leave request?")) return;
  await fetch('/api/leave/' + id + '/delete', {
    method:'POST',
    credentials:'include'
  });
  await init();
}

async function requestLeave(){
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const type = document.getElementById("leaveType").value;
  const file = document.getElementById("medical").files[0];

  const fd = new FormData();
  fd.append("start_date", start);
  fd.append("end_date", end);
  fd.append("type", type);
  if(file) fd.append("medical", file);

  const r = await fetch('/api/leave', {
    method:'POST',
    body: fd,
    credentials:'include'
  });

  if(r.ok){
    document.getElementById("msg").innerHTML = '<span class="text-success">Leave requested</span>';
    document.getElementById("medical").value = "";
    await init();
  } else {
    const e = await r.json().catch(() => ({ error: 'Request failed' }));
    document.getElementById("msg").innerText = e.error || 'Request failed';
  }
}

async function loadPayslips(){
  const r = await fetch('/api/payslips', { credentials:'include' });
  const data = await r.json();

  const box = document.getElementById("payslipBox");

  if(!data.length){
    box.innerHTML = '<div class="text-muted">No payslips</div>';
    return;
  }

  let html = '<ul class="mb-0">';
  data.forEach(p => {
    html += `<li><a href="/api/payslips/${p.id}/download">${p.original_name}</a> <small class="text-muted">(${p.uploaded_at})</small></li>`;
  });
  html += '</ul>';

  box.innerHTML = html;
}

function addOneDay(dateStr){
  const d = new Date(dateStr);
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0,10);
}

async function loadCalendar(){

  // ⭐ merr leave events
  const r = await fetch('/api/leaves', { credentials:'include' });
  const rows = await r.json();

  const leaveEvents = rows.map(l => ({
    title: `${l.username} (${l.status})`,
    start: l.start_date,
    end: addOneDay(l.end_date),
    color: l.status === 'approved' ? 'green' : l.status === 'pending' ? 'orange' : 'red'
  }));

  // ⭐ merr holidays
  const hr = await fetch('/api/holidays', { credentials:'include' });
  const holidays = await hr.json();

  const holidayEvents = holidays.map(h => ({
    title: 'Official Holiday',
    start: h.date,
	display: 'background',
    backgroundColor: '#ff3b3b'
  }));

  // ⭐ merge events
  const allEvents = [...leaveEvents, ...holidayEvents];

  if(calendar) calendar.destroy();

  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'dayGridMonth',
    height: 600,
    events: allEvents
  });

  calendar.render();
}

async function init(){
  await loadMe();
  await loadStats();
  await loadLeaves();
  await loadPayslips();
  await loadCalendar();
}

init();
</script>

</body>
</html>
